<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的视频页</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #e8f0ff);
      color: #223;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .navbar {
      width: min(900px, 100%);
      background: rgba(255, 255, 255, 0.94);
      border-radius: 18px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .navbar .logo {
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .navbar nav {
      display: flex;
      gap: 20px;
    }

    .navbar a {
      text-decoration: none;
      color: #345;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .navbar a:hover {
      color: #1d4ed8;
    }

    .card {
      width: min(900px, 100%);
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .hero {
      padding: 24px 28px 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #556;
    }

    video {
      width: 100%;
      display: block;
      background: #000;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
    <header class="navbar">
      <div class="logo">我的视频页</div>
      <nav>
        <a href="#home">首页</a>
        <a href="#about">关于</a>
        <a href="#contact">联系</a>
      </nav>
    </header>

    <div class="card">
      <div class="hero" id="home">
        <h1>fly~</h1>
        <p>beautiful~~~hahah</p>
      </div>
      <video controls poster="poster.jpg">
        <source src="sp.mp4" type="video/mp4">
        您的浏览器不支持视频播放。
      </video>
    </div>
  </body>
