<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的视频页</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #e8f0ff);
      color: #223;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: min(900px, 100%);
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .hero {
      padding: 24px 28px 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #556;
    }

    video {
      width: 100%;
      display: block;
      background: #000;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero">
      <h1>fly~</h1>
      <p>你好，这里是一个更好看的视频展示页。</p>
    </div>
    <video controls poster="poster.jpg">
      <source src="video.mp4" type="video/mp4">
      您的浏览器不支持视频播放。
    </video>
  </div>
</body>
</html>
